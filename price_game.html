<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>價錢牌讀取遊戲</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; text-align: center; background: #f0f8ff; padding: 20px; }
        #priceCard { font-size: 120px; font-weight: bold; color: #d32f2f; margin: 50px 0; background: white; padding: 30px; border: 5px solid #333; border-radius: 20px; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        #userInput { font-size: 48px; color: #388e3c; margin: 10px 0; min-height: 60px; }
        #correctAnswer { font-size: 48px; color: #1976d2; margin: 10px 0; display: none; } /* 初始隱藏 */
        button { font-size: 24px; padding: 15px 30px; margin: 10px; background: #2196f3; color: white; border: none; border-radius: 10px; cursor: pointer; }
        button:hover { background: #1976d2; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 20px; color: #757575; margin: 20px 0; }
        #score { font-size: 28px; color: #ff9800; font-weight: bold; margin: 20px 0; }
        .label { font-size: 24px; font-weight: bold; margin-top: 20px; }
        .correct { color: #388e3c; }
        .incorrect { color: #d32f2f; }
    </style>
</head>
<body>
    <h1>價錢牌讀取遊戲</h1>
    <p>點擊「開始聽取」，讀出價錢牌所表示的標價，<strong>綠色顯示您讀的內容，藍色顯示正確答案</strong>！</p>
    
    <div id="score">分數: 0 / 0</div>
    
    <div id="priceCard">$1234.50</div>
    
    <button id="startBtn">開始聽取</button>
    <button id="nextBtn">下一張</button>
    
    <div id="status">準備開始...</div>
    
    <div class="label">您讀的內容：</div>
    <div id="userInput">等緊你讀價錢...</div>
    
    <div class="label">正確答案：</div>
    <div id="correctAnswer"></div>

    <script>
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'yue-Hant-HK';
        recognition.continuous = false;
        recognition.interimResults = false;

        let currentPrice = 1234.50;
        let score = 0;
        let total = 0;
        let expectedFull = '';

        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const status = document.getElementById('status');
        const userInput = document.getElementById('userInput');
        const priceCard = document.getElementById('priceCard');
        const scoreDiv = document.getElementById('score');
        const correctAnswer = document.getElementById('correctAnswer');

        // 將數字轉換為中文數字（含單位）
        function convertNumberToChinese(text) {
            return text.replace(/(\d+)(元|角)?/g, (match, numStr, unit) => {
                const num = parseInt(numStr, 10);
                let chineseNum = numberToChinese(num);
                
                if (unit) {
                    chineseNum += unit;
                }
                
                return chineseNum;
            });
        }

        // 清理語音識別結果
        function cleanTranscript(text) {
            return text.replace(/[.,，。\s]/g, '') // 移除標點和空格
                      .replace(/蚊/g, '元')      // 統一轉換為標準用語
                      .replace(/毫子?/g, '角');
        }

        // 生成隨機價格
        function generateRandomPrice() {
            const dollars = Math.floor(Math.random() * 10000);
            const tenths = Math.floor(Math.random() * 10);
            return dollars + (tenths * 0.10);
        }

        // 數字轉中文（嚴格模式）
        function numberToChinese(num) {
            if (num === 0) return '零';
            const chineseDigits = ['零','一','二','三','四','五','六','七','八','九'];
            const units = ['','十','百','千'];
            
            let str = '';
            let n = num;
            let unitIdx = 0;
            while (n > 0) {
                const digit = n % 10;
                if (digit !== 0) {
                    str = chineseDigits[digit] + units[unitIdx] + str;
                }
                n = Math.floor(n / 10);
                unitIdx++;
            }
            return str.replace(/^一十/, '十') // 特別處理15元→「十五」非「一十五」
                     .replace(/零+/g, '零')
                     .replace(/零+$/, '');
        }

        // 生成標準讀法（嚴格模式）
        function getExpectedPrice(price) {
            const dollars = Math.floor(price);
            const cents = Math.round((price - dollars) * 10);
            
            let dollarStr = numberToChinese(dollars) || '零';
            // 特別處理100/1000元必須有「一」
            dollarStr = dollarStr.replace(/^百/, '一百').replace(/^千/, '一千');
            
            let centStr = cents > 0 ? numberToChinese(cents) + '角' : '';
            
            return dollarStr + '元' + centStr;
        }

        // 精準比對函數
        function checkCorrect(rawTranscript) {
            const spoken = cleanTranscript(rawTranscript);
            const expected = cleanTranscript(expectedFull);
            
            // 完全一致才判定正確
            return spoken === expected;
        }

        // 載入新價格
        function loadNewPrice() {
            currentPrice = generateRandomPrice();
            expectedFull = getExpectedPrice(currentPrice);
            priceCard.textContent = '$' + currentPrice.toFixed(2);
            userInput.textContent = '等緊你讀價錢...';
            correctAnswer.textContent = ''; // 初始清空
            correctAnswer.style.display = 'none'; // 初始隱藏
            status.textContent = '新價錢牌準備好！';
            status.className = '';
        }

        // 按鈕點擊事件
        startBtn.onclick = () => {
            recognition.start();
            startBtn.disabled = true;
            status.textContent = '聽緊中... 請讀出價錢！';
            userInput.textContent = '聽緊...';
            correctAnswer.textContent = ''; // 開始錄音時清空
            correctAnswer.style.display = 'none'; // 隱藏
        };

        // 語音識別結果處理
        recognition.onresult = (event) => {
            const rawTranscript = event.results[0][0].transcript;
            const displayText = convertNumberToChinese(rawTranscript);
            
            userInput.textContent = displayText;
            // 顯示正確答案（接收語音後才顯示）
            correctAnswer.textContent = expectedFull;
            correctAnswer.style.display = 'block';
            
            const isCorrect = checkCorrect(displayText);
            total++;
            
            if (isCorrect) {
                score++;
                status.innerHTML = '✅ <strong>正確！</strong>';
                status.className = 'correct';
            } else {
                status.innerHTML = '❌ <strong>唔正確！</strong>';
                status.className = 'incorrect';
            }
            
            updateScore();
            startBtn.disabled = false;
        };

        recognition.onerror = (event) => {
            status.textContent = '錯誤：' + event.error;
            startBtn.disabled = false;
        };

        recognition.onend = () => {
            startBtn.disabled = false;
        };

        // 更新分數
        function updateScore() {
            scoreDiv.textContent = `分數: ${score} / ${total}`;
        }

        // 下一張按鈕
        nextBtn.onclick = loadNewPrice;

        // 初始化
        window.onload = loadNewPrice;
    </script>
</body>

</html>
