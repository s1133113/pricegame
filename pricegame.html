<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>價錢牌讀取遊戲</title>
    <style>
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            text-align: center; 
            background: #f0f8ff; 
            padding: 20px;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        #priceCard { 
            font-size: 10vw; 
            font-weight: bold; 
            color: #d32f2f; 
            margin: 5vh 0; 
            background: white; 
            padding: 3vh 5vw; 
            border: 5px solid #333; 
            border-radius: 20px; 
            display: inline-block; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            min-width: 60vw;
            box-sizing: border-box;
        }
        #userInput { 
            font-size: 5vw; 
            color: #388e3c; 
            margin: 2vh 0; 
            min-height: 8vh; 
            word-break: break-word;
        }
        #correctAnswer { 
            font-size: 5vw; 
            color: #1976d2; 
            margin: 2vh 0; 
            display: none;
            word-break: break-word;
        }
        button { 
            font-size: 4vw; 
            padding: 2vh 4vw; 
            margin: 1vh; 
            background: #2196f3; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            min-width: 30vw;
            min-height: 8vh;
        }
        button:hover { background: #1976d2; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { 
            font-size: 3.5vw; 
            color: #757575; 
            margin: 3vh 0; 
            min-height: 5vh;
        }
        #score { 
            font-size: 4.5vw; 
            color: #ff9800; 
            font-weight: bold; 
            margin: 3vh 0; 
        }
        .label { 
            font-size: 4vw; 
            font-weight: bold; 
            margin-top: 3vh; 
        }
        .correct { color: #388e3c; }
        .incorrect { color: #d32f2f; }
        .permission-hint {
            background: #fff3e0;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 3.5vw;
        }
        
        @media (min-width: 768px) {
            #priceCard { font-size: 120px; padding: 30px; }
            #userInput, #correctAnswer { font-size: 48px; }
            button { font-size: 24px; padding: 15px 30px; min-width: auto; min-height: auto; }
            #status { font-size: 20px; }
            #score { font-size: 28px; }
            .label { font-size: 24px; }
            .permission-hint { font-size: 16px; }
        }
    </style>
</head>
<body>
    <h1>價錢牌讀取遊戲</h1>
    <p>點擊「開始聽取」，讀出價錢，<strong>綠色顯示您讀的內容，藍色顯示正確答案</strong>！</p>
    
    <div id="permissionHint" class="permission-hint" style="display: none;">
        <p>⚠️ 請允許麥克風權限</p>
        <p><small>iOS用戶：設置 > Safari > 麥克風 > 允許<br>
        Android用戶：Chrome設置 > 網站設置 > 麥克風 > 允許</small></p>
    </div>
    
    <div id="score">分數: 0 / 0</div>
    
    <div id="priceCard">$1234.50</div>
    
    <button id="startBtn">開始聽取</button>
    <button id="nextBtn">下一張</button>
    
    <div id="status">準備開始...</div>
    
    <div class="label">您讀的內容：</div>
    <div id="userInput">等緊你讀價錢...</div>
    
    <div class="label">正確答案：</div>
    <div id="correctAnswer"></div>

    <script>
        // 設備檢測
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        const isChrome = /Chrome/i.test(navigator.userAgent);
        
        // 語音識別
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isRecording = false;
        let currentPrice = 1234.50;
        let score = 0;
        let total = 0;
        let expectedFull = '';

        // DOM元素
        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const status = document.getElementById('status');
        const userInput = document.getElementById('userInput');
        const priceCard = document.getElementById('priceCard');
        const scoreDiv = document.getElementById('score');
        const correctAnswer = document.getElementById('correctAnswer');
        const permissionHint = document.getElementById('permissionHint');

        // 初始化語音識別
        function initSpeechRecognition() {
            if (!SpeechRecognition) {
                showError('您的瀏覽器不支持語音識別，請使用Chrome瀏覽器');
                return false;
            }
            
            recognition = new SpeechRecognition();
            recognition.lang = 'yue-Hant-HK';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = () => {
                isRecording = true;
                status.textContent = '聽緊中... 請讀出價錢！';
            };
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const displayText = convertNumberToChinese(transcript);
                
                userInput.textContent = displayText;
                correctAnswer.textContent = expectedFull;
                correctAnswer.style.display = 'block';
                
                const isCorrect = checkCorrect(displayText);
                total++;
                
                if (isCorrect) {
                    score++;
                    status.innerHTML = '✅ <strong>正確！</strong>';
                    status.className = 'correct';
                } else {
                    status.innerHTML = '❌ <strong>唔正確！</strong>';
                    status.className = 'incorrect';
                }
                
                updateScore();
            };
            
            recognition.onerror = (event) => {
                handleRecognitionError(event.error);
            };
            
            recognition.onend = () => {
                isRecording = false;
                startBtn.disabled = false;
            };
            
            return true;
        }

        // 開始錄音（解決權限問題的核心函數）
        async function startRecording() {
            if (isRecording) return;
            
            if (!recognition && !initSpeechRecognition()) {
                return;
            }
            
            try {
                // iOS需要先獲取媒體權限
                if (isIOS) {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    stream.getTracks().forEach(track => track.stop());
                    
                    // 必須延遲執行以確保權限生效
                    setTimeout(() => {
                        try {
                            recognition.start();
                            startBtn.disabled = true;
                            userInput.textContent = '聽緊...';
                            correctAnswer.style.display = 'none';
                        } catch (e) {
                            showError('啟動失敗，請刷新頁面重試');
                        }
                    }, 100);
                } else {
                    recognition.start();
                    startBtn.disabled = true;
                    userInput.textContent = '聽緊...';
                    correctAnswer.style.display = 'none';
                }
            } catch (error) {
                showError('請允許麥克風權限');
            }
        }

        // 錯誤處理
        function handleRecognitionError(error) {
            let message = '發生錯誤';
            switch(error) {
                case 'not-allowed':
                case 'service-not-allowed':
                    message = '請允許麥克風權限';
                    permissionHint.style.display = 'block';
                    break;
                case 'no-speech':
                    message = '未檢測到語音，請重試';
                    break;
                default:
                    message = '錯誤: ' + error;
            }
            status.textContent = message;
        }

        // 其他功能函數
        function convertNumberToChinese(text) {
            return text.replace(/(\d+)(元|角)?/g, (match, numStr, unit) => {
                const num = parseInt(numStr, 10);
                let chineseNum = numberToChinese(num);
                if (unit) chineseNum += unit === '元' ? '元' : '角';
                return chineseNum;
            });
        }

        function numberToChinese(num) {
            if (num === 0) return '零';
            const digits = ['零','一','二','三','四','五','六','七','八','九'];
            const units = ['','十','百','千'];
            let str = '';
            let n = num;
            let unitIdx = 0;
            while (n > 0) {
                const digit = n % 10;
                if (digit !== 0) {
                    str = digits[digit] + units[unitIdx] + str;
                }
                n = Math.floor(n / 10);
                unitIdx++;
            }
            return str.replace(/^一十/, '十').replace(/零+/g, '零').replace(/零+$/, '');
        }

        function generateRandomPrice() {
            const dollars = Math.floor(Math.random() * 10000);
            const cents = Math.floor(Math.random() * 10);
            return dollars + (cents * 0.1);
        }

        function getExpectedPrice(price) {
            const dollars = Math.floor(price);
            const cents = Math.round((price - dollars) * 10);
            let dollarStr = numberToChinese(dollars) || '零';
            dollarStr = dollarStr.replace(/^百/, '一百').replace(/^千/, '一千');
            let centStr = cents > 0 ? numberToChinese(cents) + '角' : '';
            return dollarStr + '元' + centStr;
        }

        function checkCorrect(text) {
            const spoken = cleanTranscript(text);
            const expected = cleanTranscript(expectedFull);
            return spoken === expected;
        }

        function cleanTranscript(text) {
            return text.replace(/[.,，。\s]/g, '')
                     .replace(/蚊/g, '元')
                     .replace(/毫子?/g, '角');
        }

        function loadNewPrice() {
            currentPrice = generateRandomPrice();
            expectedFull = getExpectedPrice(currentPrice);
            priceCard.textContent = '$' + currentPrice.toFixed(2);
            userInput.textContent = '等緊你讀價錢...';
            correctAnswer.textContent = '';
            correctAnswer.style.display = 'none';
            status.textContent = '新價錢牌準備好！';
            status.className = '';
        }

        function updateScore() {
            scoreDiv.textContent = `分數: ${score} / ${total}`;
        }

        function showError(message) {
            status.textContent = message;
            status.className = 'incorrect';
            startBtn.disabled = false;
        }

        // 初始化
        window.onload = () => {
            loadNewPrice();
            initSpeechRecognition();
            
            startBtn.onclick = startRecording;
            nextBtn.onclick = loadNewPrice;
            
            // 防止iOS雙擊縮放
            document.addEventListener('touchend', (event) => {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) event.preventDefault();
                lastTouchEnd = now;
            }, false);
            let lastTouchEnd = 0;
        };
    </script>
</body>
</html>
