<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS 價錢牌讀取遊戲</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            background: #f0f8ff; 
            padding: 20px; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        #priceCard { 
            font-size: 36px; /* 基礎字體大小 */
            font-weight: bold; 
            color: #d32f2f; 
            margin: 20px auto; 
            background: white; 
            padding: 25px 15px; 
            border: 5px solid #333; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 500px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        @media (min-width: 768px) {
            #priceCard {
                font-size: 48px; /* 電腦上更大的字體 */
                min-height: 180px;
            }
        }
        #userInput { 
            font-size: 28px; 
            color: #388e3c; 
            margin: 10px 0; 
            min-height: 50px; 
            font-weight: bold; 
            padding: 5px;
        }
        #correctAnswer { 
            font-size: 28px; 
            color: #1976d2; 
            margin: 10px 0; 
            display: none; 
            font-weight: bold; 
            padding: 5px;
        }
        button { 
            font-size: 20px; 
            padding: 15px 25px; 
            margin: 10px; 
            background: #007aff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            -webkit-tap-highlight-color: transparent;
        }
        button:active { 
            background: #0056b3; 
            transform: scale(0.98);
        }
        button:disabled { 
            background: #ccc; 
        }
        #status { 
            font-size: 18px; 
            color: #757575; 
            margin: 15px 0; 
            height: 24px; 
        }
        #score { 
            font-size: 24px; 
            color: #ff9800; 
            font-weight: bold; 
            margin: 10px 0; 
        }
        .label { 
            font-size: 18px; 
            color: #666; 
            margin-top: 15px; 
        }
        .correct { 
            color: #388e3c !important; 
        }
        .incorrect { 
            color: #d32f2f !important; 
        }
        #iosWarning {
            display: none;
            background: #fff3cd;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>價錢牌讀取遊戲</h1>
    <div id="iosWarning">請確保允許此網站使用麥克風權限</div>
    <div id="score">分數: 0 / 0</div>
    
    <div id="priceCard">準備中...</div>
    
    <div>
        <button id="startBtn">開始聽取</button>
        <button id="nextBtn">下一張</button>
    </div>
    
    <div id="status">準備開始...</div>
    
    <div class="label">您讀的內容：</div>
    <div id="userInput">---</div>
    
    <div class="label">正確答案：</div>
    <div id="correctAnswer"></div>

    <script>
        // 兼容性處理
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            document.getElementById('iosWarning').style.display = 'block';
            document.getElementById('iosWarning').textContent = "您的瀏覽器不支援語音識別，請使用 iOS Safari。";
            document.getElementById('startBtn').disabled = true;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-HK'; // iOS 對 yue-Hant-HK 支援度不一，zh-HK 最穩
        recognition.continuous = false;
        recognition.interimResults = false;

        let currentPrice = 0;
        let score = 0;
        let total = 0;
        let expectedFull = '';
        let isListening = false;

        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const status = document.getElementById('status');
        const userInput = document.getElementById('userInput');
        const priceCard = document.getElementById('priceCard');
        const scoreDiv = document.getElementById('score');
        const correctAnswer = document.getElementById('correctAnswer');
        const iosWarning = document.getElementById('iosWarning');

        // 根據數字長度調整字體大小
        function adjustFontSize(priceStr) {
            const length = priceStr.length;
            let size = 36; // 基礎字體
            
            if (length > 12) size = 28;
            else if (length > 10) size = 30;
            else if (length > 8) size = 32;
            
            // 電腦上更大
            if (window.innerWidth > 768) {
                if (length > 12) size = 36;
                else if (length > 10) size = 40;
                else if (length > 8) size = 44;
                else size = 48;
            }
            
            priceCard.style.fontSize = `${size}px`;
        }

        // iOS 必須透過 click 事件啟動
        startBtn.addEventListener('click', () => {
            if (isListening) return;
            
            try {
                recognition.start();
                isListening = true;
                status.textContent = '正在聽取...請說話';
                status.className = '';
                startBtn.disabled = true;
                userInput.textContent = '聽緊你講嘢...';
                correctAnswer.style.display = 'none';
                iosWarning.style.display = 'none';
            } catch (e) {
                status.textContent = '啟動失敗，請重試';
                startBtn.disabled = false;
                isListening = false;
                iosWarning.style.display = 'block';
            }
        });

        recognition.onresult = (event) => {
            isListening = false;
            const rawTranscript = event.results[0][0].transcript;
            // 處理 iOS 可能回傳阿拉伯數字的情況
            const displayText = convertNumberToChinese(rawTranscript);
            
            userInput.textContent = displayText;
            correctAnswer.textContent = expectedFull;
            correctAnswer.style.display = 'block';
            
            const isCorrect = checkCorrect(displayText);
            total++;
            
            if (isCorrect) {
                score++;
                status.textContent = '✅ 正確！';
                status.className = 'correct';
            } else {
                status.textContent = '❌ 唔正確！';
                status.className = 'incorrect';
            }
            updateScore();
        };

        recognition.onerror = (event) => {
            console.error(event.error);
            isListening = false;
            startBtn.disabled = false;
            
            if (event.error === 'not-allowed') {
                status.textContent = '麥克風權限被拒絕';
                iosWarning.style.display = 'block';
            } else if (event.error === 'no-speech') {
                status.textContent = '沒有檢測到語音';
            } else {
                status.textContent = '錯誤: ' + event.error;
            }
        };

        recognition.onend = () => {
            isListening = false;
            startBtn.disabled = false;
        };

        // 數字轉中文的核心邏輯
        function numberToChinese(num) {
            if (num === 0) return '零';
            const chineseDigits = ['零','一','二','三','四','五','六','七','八','九'];
            const units = ['','十','百','千'];
            let numStr = Math.floor(num).toString();
            let result = '';
            let hasZero = false;

            for (let i = 0; i < numStr.length; i++) {
                let digit = parseInt(numStr[i]);
                let unitIdx = numStr.length - 1 - i;

                if (digit !== 0) {
                    if (hasZero) { result += '零'; hasZero = false; }
                    result += chineseDigits[digit] + units[unitIdx];
                } else {
                    hasZero = true;
                }
            }
            // 處理口語習慣
            result = result.replace(/^一十/, '十'); 
            return result;
        }

        function getExpectedPrice(price) {
            const dollars = Math.floor(price);
            const cents = Math.round((price - dollars) * 10);
            
            let dollarStr = numberToChinese(dollars);
            if (dollars >= 100 && (dollarStr.startsWith('百') || dollarStr.startsWith('千'))) {
                dollarStr = '一' + dollarStr;
            }
            
            let centStr = cents > 0 ? numberToChinese(cents) + '角' : '';
            return dollarStr + '元' + centStr;
        }

        function convertNumberToChinese(text) {
            // 移除標點符號，並將阿拉伯數字轉化
            return text.replace(/\d+/g, (m) => numberToChinese(parseInt(m)))
                      .replace(/點/g, '元'); // 將"點"轉為"元"
        }

        function cleanTranscript(text) {
            return text.replace(/[.,，。\s]/g, '')
                       .replace(/蚊/g, '元')
                       .replace(/個/g, '元')
                       .replace(/毫子?/g, '角')
                       .replace(/點/g, '元')
                       .replace(/壹/g, '一').replace(/貳/g, '二'); // 防止出現大寫數字
        }

        function checkCorrect(spoken) {
            const s = cleanTranscript(spoken);
            const e = cleanTranscript(expectedFull);
            // 容許口語差異
            return s === e || s === e.replace('元', ''); 
        }

        function loadNewPrice() {
            const dollars = Math.floor(Math.random() * 9999) + 1;
            const tenths = Math.floor(Math.random() * 10);
            currentPrice = dollars + (tenths * 0.1);
            
            expectedFull = getExpectedPrice(currentPrice);
            priceCard.textContent = expectedFull; // 直接顯示中文數字
            adjustFontSize(expectedFull);
            
            userInput.textContent = '---';
            correctAnswer.style.display = 'none';
            status.textContent = '新題目已就緒';
            status.className = '';
        }

        function updateScore() {
            scoreDiv.textContent = `分數: ${score} / ${total}`;
        }

        nextBtn.onclick = loadNewPrice;
        
        // 初始加載
        document.addEventListener('DOMContentLoaded', () => {
            loadNewPrice();
            
            // 檢查權限狀態
            if (navigator.permissions) {
                navigator.permissions.query({name: 'microphone'}).then(permissionStatus => {
                    permissionStatus.onchange = () => {
                        if (permissionStatus.state === 'denied') {
                            iosWarning.style.display = 'block';
                        } else {
                            iosWarning.style.display = 'none';
                        }
                    };
                });
            }
        });
    </script>
</body>
</html>
