<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>價錢牌讀取遊戲</title>
    <style>
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            text-align: center; 
            background: #f0f8ff; 
            padding: 20px;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        #priceCard { 
            font-size: 10vw; 
            font-weight: bold; 
            color: #d32f2f; 
            margin: 5vh 0; 
            background: white; 
            padding: 3vh 5vw; 
            border: 5px solid #333; 
            border-radius: 20px; 
            display: inline-block; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            min-width: 60vw;
            box-sizing: border-box;
        }
        #userInput { 
            font-size: 5vw; 
            color: #388e3c; 
            margin: 2vh 0; 
            min-height: 8vh; 
            word-break: break-word;
        }
        #correctAnswer { 
            font-size: 5vw; 
            color: #1976d2; 
            margin: 2vh 0; 
            display: none;
            word-break: break-word;
        }
        button { 
            font-size: 4vw; 
            padding: 2vh 4vw; 
            margin: 1vh; 
            background: #2196f3; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            min-width: 30vw;
            min-height: 8vh;
        }
        button:hover { background: #1976d2; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { 
            font-size: 3.5vw; 
            color: #757575; 
            margin: 3vh 0; 
            min-height: 5vh;
        }
        #score { 
            font-size: 4.5vw; 
            color: #ff9800; 
            font-weight: bold; 
            margin: 3vh 0; 
        }
        .label { 
            font-size: 4vw; 
            font-weight: bold; 
            margin-top: 3vh; 
        }
        .correct { color: #388e3c; }
        .incorrect { color: #d32f2f; }
        .permission-panel {
            background: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 2px solid #ffb74d;
        }
        #enableMicBtn {
            background: #4caf50;
            margin: 10px auto;
        }
        
        @media (min-width: 768px) {
            #priceCard { font-size: 120px; padding: 30px; }
            #userInput, #correctAnswer { font-size: 48px; }
            button { font-size: 24px; padding: 15px 30px; min-width: 200px; min-height: auto; }
            #status { font-size: 20px; }
            #score { font-size: 28px; }
            .label { font-size: 24px; }
            .permission-panel { font-size: 18px; }
        }
    </style>
</head>
<body>
    <h1>價錢牌讀取遊戲</h1>
    <p>點擊「開始聽取」，讀出價錢，<strong>綠色顯示您讀的內容，藍色顯示正確答案</strong>！</p>
    
    <div id="permissionPanel" class="permission-panel" style="display:none;">
        <h3>⚠️ 需要麥克風權限</h3>
        <p>請點擊下方按鈕允許使用麥克風：</p>
        <button id="enableMicBtn">啟用麥克風</button>
        <p><small>iOS用戶：請在彈出窗口中點擊「允許」</small></p>
    </div>
    
    <div id="score">分數: 0 / 0</div>
    
    <div id="priceCard">$1234.50</div>
    
    <button id="startBtn" style="display:none;">開始聽取</button>
    <button id="nextBtn">下一張</button>
    
    <div id="status">準備開始...</div>
    
    <div class="label">您讀的內容：</div>
    <div id="userInput">等緊你讀價錢...</div>
    
    <div class="label">正確答案：</div>
    <div id="correctAnswer"></div>

    <script>
        // 設備檢測
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        // 語音識別
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let currentPrice = 1234.50;
        let score = 0;
        let total = 0;
        let expectedFull = '';
        let isRecording = false;

        // DOM元素
        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const status = document.getElementById('status');
        const userInput = document.getElementById('userInput');
        const priceCard = document.getElementById('priceCard');
        const scoreDiv = document.getElementById('score');
        const correctAnswer = document.getElementById('correctAnswer');
        const permissionPanel = document.getElementById('permissionPanel');
        const enableMicBtn = document.getElementById('enableMicBtn');

        // 初始化遊戲
        function initGame() {
            if (!SpeechRecognition) {
                status.textContent = '您的瀏覽器不支持語音識別';
                return;
            }
            
            loadNewPrice();
            
            if (isIOS) {
                showIOSPermissionPanel();
            } else {
                initSpeechRecognition();
                startBtn.style.display = 'inline-block';
            }
            
            // 綁定按鈕事件
            nextBtn.onclick = loadNewPrice;
        }

        // 顯示iOS權限面板
        function showIOSPermissionPanel() {
            permissionPanel.style.display = 'block';
            
            enableMicBtn.onclick = async function() {
                try {
                    // iOS必須先請求媒體權限
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    stream.getTracks().forEach(track => track.stop());
                    
                    // 初始化語音識別
                    initSpeechRecognition();
                    
                    // 顯示開始按鈕
                    permissionPanel.style.display = 'none';
                    startBtn.style.display = 'inline-block';
                } catch (error) {
                    status.textContent = '麥克風權限被拒絕，請刷新頁面重試';
                }
            };
        }

        // 初始化語音識別
        function initSpeechRecognition() {
            recognition = new SpeechRecognition();
            recognition.lang = 'yue-Hant-HK';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = () => {
                isRecording = true;
                status.textContent = '聽緊中... 請讀出價錢！';
            };
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const displayText = convertNumberToChinese(transcript);
                
                userInput.textContent = displayText;
                correctAnswer.textContent = expectedFull;
                correctAnswer.style.display = 'block';
                
                const isCorrect = checkCorrect(displayText);
                total++;
                
                if (isCorrect) {
                    score++;
                    status.innerHTML = '✅ <strong>正確！</strong>';
                    status.className = 'correct';
                } else {
                    status.innerHTML = '❌ <strong>唔正確！</strong>';
                    status.className = 'incorrect';
                }
                
                updateScore();
                isRecording = false;
            };
            
            recognition.onerror = (event) => {
                isRecording = false;
                handleRecognitionError(event.error);
            };
            
            recognition.onend = () => {
                if (isRecording) {
                    isRecording = false;
                    startBtn.disabled = false;
                }
            };
            
            startBtn.onclick = () => {
                if (isRecording) return;
                startRecording();
            };
        }

        // 開始錄音
        function startRecording() {
            try {
                recognition.start();
                startBtn.disabled = true;
                userInput.textContent = '聽緊...';
                correctAnswer.style.display = 'none';
                status.textContent = '聽緊中... 請讀出價錢！';
            } catch (error) {
                status.textContent = '啟動失敗: ' + error.message;
                startBtn.disabled = false;
            }
        }

        // 錯誤處理
        function handleRecognitionError(error) {
            let message = '發生錯誤';
            switch(error) {
                case 'not-allowed':
                case 'service-not-allowed':
                    if (isIOS) {
                        permissionPanel.style.display = 'block';
                        startBtn.style.display = 'none';
                        message = '請允許麥克風權限';
                    } else {
                        message = '請允許麥克風權限';
                    }
                    break;
                case 'no-speech':
                    message = '未檢測到語音，請重試';
                    break;
                default:
                    message = '錯誤: ' + error;
            }
            status.textContent = message;
            startBtn.disabled = false;
        }

        // 載入新價格
        function loadNewPrice() {
            currentPrice = generateRandomPrice();
            expectedFull = getExpectedPrice(currentPrice);
            priceCard.textContent = '$' + currentPrice.toFixed(2);
            userInput.textContent = '等緊你讀價錢...';
            correctAnswer.textContent = '';
            correctAnswer.style.display = 'none';
            status.textContent = '新價錢牌準備好！';
            status.className = '';
            
            if (startBtn.style.display !== 'none') {
                startBtn.disabled = false;
            }
        }

        // 生成隨機價格
        function generateRandomPrice() {
            const dollars = Math.floor(Math.random() * 10000);
            const cents = Math.floor(Math.random() * 10);
            return dollars + (cents * 0.1);
        }

        // 數字轉中文
        function numberToChinese(num) {
            if (num === 0) return '零';
            const digits = ['零','一','二','三','四','五','六','七','八','九'];
            const units = ['','十','百','千'];
            let str = '';
            let n = num;
            let unitIdx = 0;
            while (n > 0) {
                const digit = n % 10;
                if (digit !== 0) {
                    str = digits[digit] + units[unitIdx] + str;
                }
                n = Math.floor(n / 10);
                unitIdx++;
            }
            return str.replace(/^一十/, '十').replace(/零+/g, '零').replace(/零+$/, '');
        }

        // 獲取標準讀法
        function getExpectedPrice(price) {
            const dollars = Math.floor(price);
            const cents = Math.round((price - dollars) * 10);
            let dollarStr = numberToChinese(dollars) || '零';
            dollarStr = dollarStr.replace(/^百/, '一百').replace(/^千/, '一千');
            let centStr = cents > 0 ? numberToChinese(cents) + '角' : '';
            return dollarStr + '元' + centStr;
        }

        // 數字轉中文（含單位）
        function convertNumberToChinese(text) {
            return text.replace(/(\d+)(元|角)?/g, (match, numStr, unit) => {
                const num = parseInt(numStr, 10);
                let chineseNum = numberToChinese(num);
                if (unit) chineseNum += unit === '元' ? '元' : '角';
                return chineseNum;
            });
        }

        // 檢查正確性
        function checkCorrect(text) {
            const spoken = cleanTranscript(text);
            const expected = cleanTranscript(expectedFull);
            return spoken === expected;
        }

        // 清理轉錄文本
        function cleanTranscript(text) {
            return text.replace(/[.,，。\s]/g, '')
                     .replace(/蚊/g, '元')
                     .replace(/毫子?/g, '角');
        }

        // 更新分數
        function updateScore() {
            scoreDiv.textContent = `分數: ${score} / ${total}`;
        }

        // 防止iOS雙擊縮放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (event) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) event.preventDefault();
            lastTouchEnd = now;
        }, false);

        // 啟動遊戲
        window.onload = initGame;
    </script>
</body>
</html>
