<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>價錢牌讀取遊戲</title>
    <style>
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            text-align: center; 
            background: #f0f8ff; 
            padding: 20px;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        #priceCard { 
            font-size: 10vw; 
            font-weight: bold; 
            color: #d32f2f; 
            margin: 5vh 0; 
            background: white; 
            padding: 3vh 5vw; 
            border: 5px solid #333; 
            border-radius: 20px; 
            display: inline-block; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            min-width: 60vw;
            box-sizing: border-box;
        }
        #userInput { 
            font-size: 5vw; 
            color: #388e3c; 
            margin: 2vh 0; 
            min-height: 8vh; 
            word-break: break-word;
        }
        #correctAnswer { 
            font-size: 5vw; 
            color: #1976d2; 
            margin: 2vh 0; 
            display: none;
            word-break: break-word;
        }
        button { 
            font-size: 4vw; 
            padding: 2vh 4vw; 
            margin: 1vh; 
            background: #2196f3; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            min-width: 30vw;
            min-height: 8vh;
        }
        button:hover { background: #1976d2; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { 
            font-size: 3.5vw; 
            color: #757575; 
            margin: 3vh 0; 
            min-height: 5vh;
        }
        #score { 
            font-size: 4.5vw; 
            color: #ff9800; 
            font-weight: bold; 
            margin: 3vh 0; 
        }
        .label { 
            font-size: 4vw; 
            font-weight: bold; 
            margin-top: 3vh; 
        }
        .correct { color: #388e3c; }
        .incorrect { color: #d32f2f; }
        
        /* 移動設備特定樣式 */
        @media (min-width: 768px) {
            #priceCard { font-size: 120px; padding: 30px; }
            #userInput, #correctAnswer { font-size: 48px; }
            button { font-size: 24px; padding: 15px 30px; min-width: auto; min-height: auto; }
            #status { font-size: 20px; }
            #score { font-size: 28px; }
            .label { font-size: 24px; }
        }

        /* 權限提示樣式 */
        .permission-hint {
            background: #fff3e0;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 3.5vw;
        }
        @media (min-width: 768px) {
            .permission-hint { font-size: 16px; }
        }
    </style>
</head>
<body>
    <h1>價錢牌讀取遊戲</h1>
    <p>點擊「開始聽取」，讀出價錢，<strong>綠色顯示您讀的內容，藍色顯示正確答案</strong>！</p>
    
    <div id="permissionHint" class="permission-hint" style="display: none;">
        <p>⚠️ 請允許麥克風權限使用語音功能</p>
        <p><small>在瀏覽器設置中啟用後刷新頁面</small></p>
    </div>
    
    <div id="score">分數: 0 / 0</div>
    
    <div id="priceCard">$1234.50</div>
    
    <button id="startBtn">開始聽取</button>
    <button id="nextBtn">下一張</button>
    
    <div id="status">準備開始...</div>
    
    <div class="label">您讀的內容：</div>
    <div id="userInput">等緊你讀價錢...</div>
    
    <div class="label">正確答案：</div>
    <div id="correctAnswer"></div>

    <script>
        // 檢測是否為移動設備
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // 語音識別相關變量
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isPermissionGranted = false;
        let currentPrice = 1234.50;
        let score = 0;
        let total = 0;
        let expectedFull = '';

        // DOM元素
        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const status = document.getElementById('status');
        const userInput = document.getElementById('userInput');
        const priceCard = document.getElementById('priceCard');
        const scoreDiv = document.getElementById('score');
        const correctAnswer = document.getElementById('correctAnswer');
        const permissionHint = document.getElementById('permissionHint');

        // 檢查瀏覽器支持
        function checkBrowserSupport() {
            if (!SpeechRecognition) {
                status.textContent = '您的瀏覽器不支持語音識別功能，請使用Chrome或Edge瀏覽器';
                startBtn.disabled = true;
                permissionHint.style.display = 'block';
                return false;
            }
            return true;
        }

        // 請求麥克風權限
        async function requestMicrophonePermission() {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('瀏覽器不支持媒體設備');
                }
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());
                isPermissionGranted = true;
                permissionHint.style.display = 'none';
                return true;
            } catch (error) {
                console.error('麥克風權限被拒絕:', error);
                status.textContent = '需要麥克風權限才能使用語音功能';
                permissionHint.style.display = 'block';
                startBtn.disabled = true;
                return false;
            }
        }

        // 初始化語音識別
        function initSpeechRecognition() {
            if (!SpeechRecognition) return;
            
            recognition = new SpeechRecognition();
            recognition.lang = 'yue-Hant-HK';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            if (isMobile) {
                recognition.maxAlternatives = 3;
            }

            recognition.onresult = (event) => {
                const rawTranscript = event.results[0][0].transcript;
                const displayText = convertNumberToChinese(rawTranscript);
                
                userInput.textContent = displayText;
                correctAnswer.textContent = expectedFull;
                correctAnswer.style.display = 'block';
                
                const isCorrect = checkCorrect(displayText);
                total++;
                
                if (isCorrect) {
                    score++;
                    status.innerHTML = '✅ <strong>正確！</strong>';
                    status.className = 'correct';
                } else {
                    status.innerHTML = '❌ <strong>唔正確！</strong>';
                    status.className = 'incorrect';
                }
                
                updateScore();
                startBtn.disabled = false;
            };

            recognition.onerror = (event) => {
                let errorMessage = '錯誤：' + event.error;
                if (event.error === 'not-allowed') {
                    errorMessage = '請允許麥克風權限';
                    permissionHint.style.display = 'block';
                } else if (event.error === 'no-speech') {
                    errorMessage = '未檢測到語音，請重試';
                }
                status.textContent = errorMessage;
                startBtn.disabled = false;
            };

            recognition.onend = () => {
                if (startBtn.disabled) {
                    startBtn.disabled = false;
                }
            };
        }

        // 將數字轉換為中文數字（含單位）
        function convertNumberToChinese(text) {
            return text.replace(/(\d+)(元|角)?/g, (match, numStr, unit) => {
                const num = parseInt(numStr, 10);
                let chineseNum = numberToChinese(num);
                
                if (unit) {
                    chineseNum += unit;
                }
                
                return chineseNum;
            });
        }

        // 清理語音識別結果
        function cleanTranscript(text) {
            return text.replace(/[.,，。\s]/g, '')
                      .replace(/蚊/g, '元')
                      .replace(/毫子?/g, '角');
        }

        // 生成隨機價格
        function generateRandomPrice() {
            const dollars = Math.floor(Math.random() * 10000);
            const tenths = Math.floor(Math.random() * 10);
            return dollars + (tenths * 0.10);
        }

        // 數字轉中文（嚴格模式）
        function numberToChinese(num) {
            if (num === 0) return '零';
            const chineseDigits = ['零','一','二','三','四','五','六','七','八','九'];
            const units = ['','十','百','千'];
            
            let str = '';
            let n = num;
            let unitIdx = 0;
            while (n > 0) {
                const digit = n % 10;
                if (digit !== 0) {
                    str = chineseDigits[digit] + units[unitIdx] + str;
                }
                n = Math.floor(n / 10);
                unitIdx++;
            }
            return str.replace(/^一十/, '十')
                     .replace(/零+/g, '零')
                     .replace(/零+$/, '');
        }

        // 生成標準讀法（嚴格模式）
        function getExpectedPrice(price) {
            const dollars = Math.floor(price);
            const cents = Math.round((price - dollars) * 10);
            
            let dollarStr = numberToChinese(dollars) || '零';
            dollarStr = dollarStr.replace(/^百/, '一百').replace(/^千/, '一千');
            
            let centStr = cents > 0 ? numberToChinese(cents) + '角' : '';
            
            return dollarStr + '元' + centStr;
        }

        // 精準比對函數
        function checkCorrect(rawTranscript) {
            const spoken = cleanTranscript(rawTranscript);
            const expected = cleanTranscript(expectedFull);
            return spoken === expected;
        }

        // 載入新價格
        function loadNewPrice() {
            currentPrice = generateRandomPrice();
            expectedFull = getExpectedPrice(currentPrice);
            priceCard.textContent = '$' + currentPrice.toFixed(2);
            userInput.textContent = '等緊你讀價錢...';
            correctAnswer.textContent = '';
            correctAnswer.style.display = 'none';
            status.textContent = '新價錢牌準備好！';
            status.className = '';
        }

        // 更新分數
        function updateScore() {
            scoreDiv.textContent = `分數: ${score} / ${total}`;
        }

        // 按鈕點擊事件
        startBtn.onclick = async () => {
            if (!isPermissionGranted) {
                const granted = await requestMicrophonePermission();
                if (!granted) return;
            }
            
            if (!recognition) {
                initSpeechRecognition();
            }
            
            try {
                recognition.start();
                startBtn.disabled = true;
                status.textContent = '聽緊中... 請讀出價錢！';
                userInput.textContent = '聽緊...';
                correctAnswer.textContent = '';
                correctAnswer.style.display = 'none';
                
                if (isMobile) {
                    setTimeout(() => {
                        if (startBtn.disabled) {
                            recognition.stop();
                            status.textContent = '聽取超時，請重試';
                            startBtn.disabled = false;
                        }
                    }, 8000);
                }
            } catch (error) {
                console.error('語音識別錯誤:', error);
                status.textContent = '語音識別啟動失敗，請刷新頁面重試';
                startBtn.disabled = false;
            }
        };

        // 下一張按鈕
        nextBtn.onclick = loadNewPrice;

        // 防止移動設備上的雙擊縮放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // 頁面初始化
        window.onload = async () => {
            loadNewPrice();
            checkBrowserSupport();
            
            // 在移動設備上預先請求權限
            if (isMobile) {
                await requestMicrophonePermission();
            }
            
            // 初始化語音識別
            initSpeechRecognition();
        };
    </script>
</body>
</html>
